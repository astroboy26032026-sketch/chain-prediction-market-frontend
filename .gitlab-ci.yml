workflow:
  rules:
    - if: '$CI_COMMIT_REF_NAME == "master"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
#  - build
  - deploy

variables:
  IMAGE: "$CI_REGISTRY/pumpfunclone/pump_fun_clone/pfc-fe"
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  SSH_PORT: "22"


.ssh_remote_base:
  image: alpine:3.20
  before_script:
    - apk add --no-cache openssh-client sshpass curl rsync
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
    - export TARGET="$SSH_USER@$SSH_HOST"
    - export SSH_OPTS="-p ${SSH_PORT} -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes"
    - export SCP_OPTS="-P ${SSH_PORT} -o PreferredAuthentications=password,keyboard-interactive -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes"


